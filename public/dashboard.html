<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="css/style.css">
</head>

<body onload="loadDashboard()">

<div class="panel">
  <h1>Dashboard</h1>
</div>

<div class="grid">

  <div class="panel glow">
    <h3>Player Count</h3>
    <p id="players">0/40</p>
  </div>

  <div class="panel glow">
    <h3>Queue</h3>
    <p id="queue">0</p>
  </div>

  <div class="panel glow">
    <h3>Status</h3>
    <p id="status">OFFLINE</p>
  </div>

</div>

<script src="js/live.js"></script>
</body>
</html>
